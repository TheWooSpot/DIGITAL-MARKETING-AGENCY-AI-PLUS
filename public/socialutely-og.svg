<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Socialutely  AI marketing platform</title>
  <desc id="desc">Open Graph preview: Socialutely wordmark on dark background with gold accent.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080d"/>
      <stop offset="55%" style="stop-color:#0f1219"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9973a"/>
      <stop offset="100%" style="stop-color:#e8c066"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>
  <text x="80" y="200" fill="#c9973a" font-family="system-ui, Segoe UI, sans-serif" font-size="22" font-weight="600" letter-spacing="0.35em">AI MARKETING PLATFORM</text>
  <text x="80" y="340" fill="#f5f0e6" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="300" letter-spacing="-0.02em">Socialutely</text>
  <text x="80" y="410" fill="#c9973a" font-family="Georgia, serif" font-size="36" font-style="italic" font-weight="400">Intelligence that finds, scores, and converts.</text>
  <text x="80" y="520" fill="#8a929e" font-family="system-ui, sans-serif" font-size="20" max-width="900">AI+ revenue-oriented marketing for startups, enterprises, SMBs &amp; non-profits</text>
</svg>
