<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Working session set</title>
</head>
<body style="margin:0;padding:0;background:#07090f;color:#d6deea;font-family:Georgia,serif;line-height:1.6;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#07090f;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="max-width:560px;background:#0c0f1a;border:1px solid rgba(201,153,58,0.25);border-radius:8px;padding:36px 32px;">
          <tr>
            <td>
              <p style="margin:0 0 8px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#c9993a;font-family:system-ui,sans-serif;">AI Readiness Labs</p>
              <h1 style="margin:0 0 16px;font-size:24px;font-weight:400;color:#f0f4ff;font-family:Georgia,serif;">Working session confirmed</h1>
              <p style="margin:0 0 20px;font-size:16px;color:#9fb0c7;">Hi {{partner_first_name}},</p>
              <p style="margin:0 0 20px;font-size:16px;color:#9fb0c7;">Your AI Readiness Labs working session with the team is scheduled.</p>
              <div style="margin:24px 0;padding:18px 20px;background:#080b12;border-left:3px solid #c9993a;border-radius:4px;">
                <p style="margin:0 0 8px;font-size:15px;color:#f0f4ff;"><strong>{{meeting_date_long}}</strong></p>
                <p style="margin:0;font-size:15px;color:#c9993a;">{{meeting_time_local}} · {{meeting_duration_min}} minutes</p>
              </div>
              <p style="margin:20px 0;font-size:15px;color:#9fb0c7;">{{partner_list}}</p>
              <p style="margin:28px 0;">
                <a href="{{meeting_link}}" style="display:inline-block;background:#c9993a;color:#07090f;text-decoration:none;padding:12px 22px;border-radius:6px;font-family:system-ui,sans-serif;font-size:14px;font-weight:600;">Join session</a>
              </p>
              <p style="margin:24px 0 0;font-size:13px;color:#7f92ac;font-style:italic;">— the team · AI Readiness Labs</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
